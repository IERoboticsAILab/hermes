haptic_vest_node:
  ros__parameters:
    serial_port: /dev/ttyUSB0
    baud_rate: 115200
    serial_hz: 20.0
    serial_retry_s: 2.0
    robot_ids: [r1, r2, r3, r4, r5, r6]
    motor_robot_ids: [r1, r2, r3, r4, r5, r6]
    motor_labels: [left_sleeve, right_sleeve, left_shoulder, right_shoulder, left_torso, right_torso]
    robot_state_topic: /hermes/robot_state_beacon
    robot_status_topic: /hermes/robot_haptic_status
    swarm_intent_topic: /hermes/swarm_intent
    swarm_state_topic: /hermes/swarm_state
    command_packet_topic: /hermes/command_packets
    debug_topic: /hermes/haptic_vest_state
    robot_state_timeout_ms: 1000
    robot_status_timeout_ms: 1200
    require_robot_status: false
    gesture_feedback_ms: 450
    gesture_min_gap_ms: 250
    formation_reached_feedback_ms: 700
    formation_reached_position_tolerance_m: 0.18
    ignore_command_effect_types: [cmd_vel_stream, set_param_stream, gate_motion]
    dense_ratio_threshold: 0.80
    sparse_ratio_threshold: 1.25
    default_target_spacing_m: 1.00
